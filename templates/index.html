<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css?v=20260324d">
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Login -->
        <div id="login-screen" class="hidden flex-grow flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
                <div class="text-center mb-8">
                    <div class="bg-pastel-blue w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-box-open text-pastel-blue text-2xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900">Sistema de Gestão</h1>
                    <p class="text-gray-500">Entre para gerenciar seu estoque</p>
                </div>
                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                        <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-200 focus:border-blue-400 transition-all outline-none" placeholder="Digite seu usuário" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-200 focus:border-blue-400 transition-all outline-none" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-100 transition-all transform active:scale-[0.98]">
                        Entrar
                    </button>
                    <div id="login-error" class="hidden text-red-500 text-sm text-center mt-4"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="main-screen" class="hidden flex flex-grow h-screen overflow-hidden">
            <!-- Sidebar -->
            <div id="mobile-sidebar-overlay" class="hidden fixed inset-0 bg-black/40 z-[60]"></div>
            <aside id="app-sidebar" class="w-64 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col">
                <div class="p-6 flex items-center gap-3">
                    <button id="mobile-close-sidebar-btn" class="lg:hidden text-gray-500 hover:text-gray-700 touch-target">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                    <div class="bg-pastel-blue p-2 rounded-lg">
                        <i class="fas fa-cubes text-pastel-blue text-xl"></i>
                    </div>
                    <span class="font-bold text-lg">Sistema de Gestão</span>
                </div>
                
                <nav class="flex-grow py-4 px-3 space-y-1 overflow-y-auto">
                    <a href="#" data-view="dashboard" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-chart-line w-5"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#" data-view="products" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-boxes-stacked w-5"></i>
                        <span>Produtos</span>
                    </a>
                    <a href="#" data-view="clients" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-users w-5"></i>
                        <span>Clientes</span>
                    </a>
                    <a href="#" data-view="sales" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-cart-shopping w-5"></i>
                        <span>Vendas</span>
                    </a>
                    <a href="#" data-view="purchases" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-truck-ramp-box w-5"></i>
                        <span>Compras</span>
                    </a>
                    <a href="#" data-view="finance" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-wallet w-5"></i>
                        <span>Financeiro</span>
                    </a>
                    <a href="#" data-view="reports" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all">
                        <i class="fas fa-file-invoice-dollar w-5"></i>
                        <span>Relatórios</span>
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-50">
                    <button id="logout-btn" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-all w-full">
                        <i class="fas fa-right-from-bracket w-5"></i>
                        <span>Sair</span>
                    </button>
                </div>
            </aside>

            <!-- Content -->
            <main class="flex-grow flex flex-col bg-gray-50 overflow-hidden">
                <header id="main-header" class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-8 flex-shrink-0">
                    <h2 id="current-view-title" class="text-xl font-bold text-gray-800">Dashboard</h2>
                    <div class="flex items-center gap-4">
                        <button id="mobile-menu-btn" class="lg:hidden text-gray-600 hover:text-gray-800 touch-target">
                            <i class="fas fa-bars text-lg"></i>
                        </button>
                        <div id="connection-status" class="flex items-center gap-2 px-3 py-1 rounded-full bg-green-50 text-green-600 text-xs font-bold">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            <span>Online</span>
                        </div>
                        <div id="user-meta" class="flex flex-col text-right">
                            <span id="user-display-name" class="text-sm font-semibold">Administrador</span>
                            <span class="text-xs text-gray-400">Online</span>
                        </div>
                        <div id="user-avatar" class="w-10 h-10 rounded-full bg-pastel-blue flex items-center justify-center text-pastel-blue font-bold">
                            A
                        </div>
                    </div>
                </header>

                <div id="view-container" class="p-8 overflow-y-auto flex-grow">
                </div>
            </main>
        </div>
    </div>

    <!-- Modelos -->
    <div id="modal-container" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Notificação (tentando)-->
    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 z-[100]">
        <div id="toast-content" class="bg-white px-6 py-4 rounded-xl shadow-2xl border border-gray-100 flex items-center gap-4">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center text-white"></div>
            <div>
                <p id="toast-message" class="font-semibold text-gray-800"></p>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js?v=20260324c"></script>
    <script src="/static/js/app.js?v=20260324c"></script>
</body>
</html>
